name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.201

      - name: Restore
        run: dotnet restore MetaQuestFileManager.slnx

      - name: Build
        run: dotnet build MetaQuestFileManager.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test MetaQuestFileManager.slnx --configuration Release --no-build

      - name: CLI smoke
        run: dotnet run --project src/MetaQuestFileManager.Cli --configuration Release --no-build -- --help

      - name: Public boundary
        shell: pwsh
        run: pwsh -NoProfile -File ./tools/Test-PublicBoundary.ps1
