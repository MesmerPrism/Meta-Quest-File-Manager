name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.201

      - name: Restore
        run: dotnet restore MetaQuestFileManager.slnx

      - name: Build
        run: dotnet build MetaQuestFileManager.slnx --configuration Release --no-restore

      - name: Brand assets
        shell: pwsh
        run: |
          $executables = @(
            './src/MetaQuestFileManager.App/bin/Release/net10.0-windows10.0.19041.0/MetaQuestFileManager.exe'
            './src/MetaQuestFileManager.Cli/bin/Release/net10.0/meta-quest-file-manager.exe'
            './src/MetaQuestFileManager.Setup/bin/Release/net10.0-windows10.0.19041.0/MetaQuestFileManager.Setup.exe'
          )
          ./tools/app/Test-BrandAssets.ps1 -Executable $executables

      - name: Test
        run: dotnet test MetaQuestFileManager.slnx --configuration Release --no-build

      - name: CLI smoke
        run: dotnet run --project src/MetaQuestFileManager.Cli --configuration Release --no-build -- --help

      - name: Public boundary
        shell: pwsh
        run: pwsh -NoProfile -File ./tools/Test-PublicBoundary.ps1
