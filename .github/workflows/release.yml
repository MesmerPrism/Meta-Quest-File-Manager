name: Release Windows preview

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version without v, for example 0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-2025-vs2026

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.201

      - uses: microsoft/setup-msbuild@v2

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $semanticVersion = '${{ inputs.version }}'
            $tagName = "v$semanticVersion"
          }
          else {
            $tagName = '${{ github.ref_name }}'
            $semanticVersion = $tagName -replace '^v', ''
          }

          if ($semanticVersion -notmatch '^\d+\.\d+\.\d+$') {
            throw "Version must look like 0.1.0, got $semanticVersion"
          }

          "semantic_version=$semanticVersion" | Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "tag_name=$tagName" | Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Restore signing material
        shell: pwsh
        env:
          PACKAGE_PFX_BASE64: ${{ secrets.WINDOWS_PACKAGE_CERTIFICATE_BASE64 }}
          SETUP_PFX_BASE64: ${{ secrets.WINDOWS_PREVIEW_SETUP_CERTIFICATE_BASE64 }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PACKAGE_PFX_BASE64)) {
            throw 'WINDOWS_PACKAGE_CERTIFICATE_BASE64 is not configured.'
          }
          if ([string]::IsNullOrWhiteSpace($env:SETUP_PFX_BASE64)) {
            throw 'WINDOWS_PREVIEW_SETUP_CERTIFICATE_BASE64 is not configured.'
          }

          [IO.File]::WriteAllBytes(
            (Join-Path $env:RUNNER_TEMP 'package-signing.pfx'),
            [Convert]::FromBase64String($env:PACKAGE_PFX_BASE64))
          [IO.File]::WriteAllBytes(
            (Join-Path $env:RUNNER_TEMP 'setup-signing.pfx'),
            [Convert]::FromBase64String($env:SETUP_PFX_BASE64))

      - name: Build and validate release assets
        shell: pwsh
        env:
          PACKAGE_PFX_PASSWORD: ${{ secrets.WINDOWS_PACKAGE_CERTIFICATE_PASSWORD }}
          SETUP_PFX_PASSWORD: ${{ secrets.WINDOWS_PREVIEW_SETUP_CERTIFICATE_PASSWORD }}
          PACKAGE_PUBLISHER: ${{ secrets.WINDOWS_PACKAGE_PUBLISHER }}
          PACKAGE_TIMESTAMP_URL: ${{ vars.WINDOWS_PACKAGE_TIMESTAMP_URL }}
          SETUP_TIMESTAMP_URL: ${{ vars.WINDOWS_PREVIEW_SETUP_TIMESTAMP_URL }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PACKAGE_PFX_PASSWORD) -or
              [string]::IsNullOrWhiteSpace($env:SETUP_PFX_PASSWORD) -or
              [string]::IsNullOrWhiteSpace($env:PACKAGE_PUBLISHER)) {
            throw 'Package/setup signing passwords and WINDOWS_PACKAGE_PUBLISHER must be configured.'
          }

          $packageTimestamp = if ($env:PACKAGE_TIMESTAMP_URL) { $env:PACKAGE_TIMESTAMP_URL } else { 'http://timestamp.digicert.com' }
          $setupTimestamp = if ($env:SETUP_TIMESTAMP_URL) { $env:SETUP_TIMESTAMP_URL } else { 'http://timestamp.digicert.com' }
          ./tools/app/Invoke-ReleaseBuild.ps1 `
            -Version '${{ steps.version.outputs.semantic_version }}' `
            -PackageCertificatePath (Join-Path $env:RUNNER_TEMP 'package-signing.pfx') `
            -PackageCertificatePassword $env:PACKAGE_PFX_PASSWORD `
            -SetupCertificatePath (Join-Path $env:RUNNER_TEMP 'setup-signing.pfx') `
            -SetupCertificatePassword $env:SETUP_PFX_PASSWORD `
            -Publisher $env:PACKAGE_PUBLISHER `
            -PackageTimestampUrl $packageTimestamp `
            -SetupTimestampUrl $setupTimestamp

      - uses: actions/upload-artifact@v7
        with:
          name: MetaQuestFileManager-windows-preview
          path: artifacts/release

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tagName = '${{ steps.version.outputs.tag_name }}'
          $assets = Get-ChildItem artifacts/release -File | ForEach-Object FullName
          gh release view $tagName *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tagName $assets --clobber
          }
          else {
            gh release create $tagName $assets `
              --title "Meta Quest File Manager $tagName" `
              --generate-notes `
              --latest `
              --target $env:GITHUB_SHA
          }

      - name: Remove temporary signing files
        if: always()
        shell: pwsh
        run: |
          Remove-Item -LiteralPath (Join-Path $env:RUNNER_TEMP 'package-signing.pfx') -Force -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath (Join-Path $env:RUNNER_TEMP 'setup-signing.pfx') -Force -ErrorAction SilentlyContinue
