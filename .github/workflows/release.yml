name: Release Windows preview

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version without v, for example 0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.201

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $semanticVersion = '${{ inputs.version }}'
            $tagName = "v$semanticVersion"
          }
          else {
            $tagName = '${{ github.ref_name }}'
            $semanticVersion = $tagName -replace '^v', ''
          }

          if ($semanticVersion -notmatch '^\d+\.\d+\.\d+$') {
            throw "Version must look like 0.1.0, got $semanticVersion"
          }

          "semantic_version=$semanticVersion" | Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "tag_name=$tagName" | Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Restore, build, and test
        run: |
          dotnet restore MetaQuestFileManager.slnx
          dotnet build MetaQuestFileManager.slnx --configuration Release --no-restore -p:Version=${{ steps.version.outputs.semantic_version }}
          dotnet test MetaQuestFileManager.slnx --configuration Release --no-build

      - name: Publish Windows app
        run: >
          dotnet publish src/MetaQuestFileManager.App/MetaQuestFileManager.App.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:Version=${{ steps.version.outputs.semantic_version }}
          --output artifacts/app-win-x64

      - name: Publish CLI
        run: >
          dotnet publish src/MetaQuestFileManager.Cli/MetaQuestFileManager.Cli.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:Version=${{ steps.version.outputs.semantic_version }}
          --output artifacts/cli-win-x64

      - name: Package archives and checksums
        shell: pwsh
        run: |
          $releaseRoot = Join-Path $PWD 'artifacts/release'
          $windowsRoot = Join-Path $PWD 'artifacts/windows-win-x64'
          New-Item -ItemType Directory -Force $releaseRoot | Out-Null
          New-Item -ItemType Directory -Force $windowsRoot | Out-Null
          Copy-Item artifacts/app-win-x64/* $windowsRoot -Recurse
          Copy-Item artifacts/cli-win-x64/meta-quest-file-manager.exe $windowsRoot
          Compress-Archive -Path artifacts/windows-win-x64/* -DestinationPath "$releaseRoot/MetaQuestFileManager-win-x64.zip"
          Compress-Archive -Path artifacts/cli-win-x64/* -DestinationPath "$releaseRoot/meta-quest-file-manager-cli-win-x64.zip"
          Get-FileHash "$releaseRoot/*.zip" -Algorithm SHA256 |
            ForEach-Object { '{0} *{1}' -f $_.Hash.ToLowerInvariant(), [IO.Path]::GetFileName($_.Path) } |
            Set-Content "$releaseRoot/SHA256SUMS.txt" -Encoding utf8

      - uses: actions/upload-artifact@v7
        with:
          name: MetaQuestFileManager-windows-preview
          path: artifacts/release

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tagName = '${{ steps.version.outputs.tag_name }}'
          $assets = Get-ChildItem artifacts/release -File | ForEach-Object FullName
          gh release view $tagName *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tagName $assets --clobber
          }
          else {
            gh release create $tagName $assets --title "Meta Quest File Manager $tagName" --generate-notes --latest --target $env:GITHUB_SHA
          }
